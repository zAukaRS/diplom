<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Административная система общежитий</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <aside class="sidebar">
        <h2>Админ-панель</h2>
        <ul>
            <li>🏠 Главная</li>
            <li>📊 Отчёты</li>
            <li>🛏 Комнаты</li>
            <li>🏢 Общежития</li>
            <li><a href="/admin_management">👤 Управление админами</a></li>
            <li><a href="/logout">🚪 Выход</a></li>
        </ul>
    </aside>
    <div class="main-content">
        <header>
            <h1>Система управления общежитиями</h1>
        </header>
        <section class="cards">
            <div class="card">
                <h2>72%</h2>
                <p>Средняя загрузка</p>
            </div>
            <div class="card">
                <h2>87</h2>
                <p>Текущих проживающих</p>
            </div>
            <div class="card">
                <h2>33</h2>
                <p>Свободных мест</p>
            </div>
            <div class="card">
                <h2>12</h2>
                <p>Выселений за месяц</p>
            </div>
        </section>

        <section class="report-section">
            <h2>Сформировать отчёт</h2>
            <div class="report-form">
                <label>С:</label>
                <input type="date">
                <label>По:</label>
                <input type="date">
                <button>Сформировать</button>
            </div>
        </section>

        <section class="table-section">
            <div class="filters compact">
                <select id="fieldFilter" class="filter-select">
                    <option value="">Месторождение</option>
                </select>
                <select id="yearFilter" class="filter-select">
                    <option value="2024">2024</option>
                    <option value="2025" selected>2025</option>
                    <option value="2026">2026</option>
                </select>
                <select id="monthFilter" class="filter-select">
                    <option value="1">Янв</option>
                    <option value="2">Фев</option>
                    <option value="3">Мар</option>
                    <option value="4">Апр</option>
                    <option value="5">Май</option>
                    <option value="6">Июн</option>
                    <option value="7">Июл</option>
                    <option value="8">Авг</option>
                    <option value="9">Сен</option>
                    <option value="10">Окт</option>
                    <option value="11">Ноя</option>
                    <option value="12">Дек</option>
                </select>
                <button onclick="loadCalendar()" class="btn-compact">Показать</button>
            </div>

            <div class="table-header">
                <h2>Отчёт по проживающим</h2>
                <button id="editModeBtn" onclick="toggleEditMode()">✏️ Режим редактирования</button>
                <button id="addResidentBtn">Добавить запись</button>
                <form id="uploadForm" enctype="multipart/form-data">
                    <input type="file" id="excelFile" accept=".xlsx,.xls">
                    <button type="submit">Загрузить Excel</button>
                </form>
            </div>


            <table>
                <thead id="calendarHead"></thead>
                <tbody id="calendarBody"></tbody>
            </table>
        </section>
    </div>
</div>
<script src="js/app.js"></script>
</body>
</html>
